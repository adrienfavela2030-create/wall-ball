<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wall Ball Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
color:white;
text-align:center;
transition:.4s;
min-height:100vh;
}

body.original{
background:linear-gradient(#4d8f3a,#2f5e25);
}

body.pro{
background:linear-gradient(#220000,#000);
}

h1{
font-size:50px;
margin:25px;
letter-spacing:3px;
}

.setup{
padding:30px;
}

input{
display:block;
margin:15px auto;
width:280px;
padding:16px;
font-size:18px;
border:none;
border-radius:15px;
outline:none;
}

.modeButtons button{
width:180px;
font-size:20px;
}

button{
padding:18px 30px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:18px;
cursor:pointer;
transition:.25s;
margin:8px;
}

button:hover{
transform:scale(1.08);
}

.original button{
background:#7d4cff;
color:white;
}

.pro button{
background:#b10000;
color:white;
box-shadow:0 0 20px red;
}

#game{
display:none;
}

.players{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:30px;
}

.player{

width:300px;
padding:25px;
border-radius:30px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(12px);

box-shadow:0 10px 30px rgba(0,0,0,.4);

position:relative;
overflow:hidden;
}

.player h2{
font-size:30px;
}

.lives{
font-size:55px;
margin:20px;
}

.lifeBtn{
width:110px;
font-size:28px;
}

.dead{
opacity:.35;
}

.tombstone{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:110px;
animation:slam .7s forwards;
}

@keyframes slam{

0%{
top:-300px;
}

75%{
top:15px;
}

100%{
top:0;
}

}

#winner{
font-size:60px;
color:gold;
margin:30px;
}

#timer{
font-size:40px;
margin:20px;
}

</style>
</head>

<body class="original">

<div id="setup" class="setup">

<h1>WALL BALL</h1>

<div id="nameInputs">

<input placeholder="Player 1">
<input placeholder="Player 2">

</div>

<button onclick="addInput()">+ Add Player</button>

<div class="modeButtons">

<button onclick="setMode('original')">
ORIGINAL
</button>

<button onclick="setMode('pro')">
PRO
</button>

</div>

<button onclick="startGame()">
START MATCH
</button>

</div>



<div id="game">

<h1>WALL BALL</h1>

<div id="timer">00:00</div>

<div class="players" id="players"></div>

<div id="winner"></div>

</div>


<audio id="deathSound">
<source src="https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3">
</audio>


<script>

let mode="original";

let maxPlayers=4;

let players=[];

let seconds=0;


function setMode(newMode){

mode=newMode;

document.body.className=newMode;

}


function addInput(){

let container=
document.getElementById("nameInputs");

if(container.children.length>=4)return;

let input=
document.createElement("input");

input.placeholder=
"Player "+(container.children.length+1);

container.appendChild(input);

}


function startGame(){

let inputs=
document.querySelectorAll("#nameInputs input");

players=[];

inputs.forEach(i=>{

let name=i.value.trim();

if(name){

players.push({

name:name,
lives:5,
dead:false

});

}

});

if(players.length<2){

alert("Need 2 players");

return;

}

document.getElementById("setup").style.display="none";

document.getElementById("game").style.display="block";

render();

}


function changeLife(index, amount){

let p=players[index];

if(p.dead)return;

p.lives+=amount;

if(p.lives<=0){

p.lives=0;

p.dead=true;

document.getElementById("deathSound").play();

}

render();

checkWinner();

}


function checkWinner(){

let alive=
players.filter(x=>!x.dead);

if(alive.length===1){

document.getElementById("winner").innerHTML=

"🏆 "+alive[0].name+" WINS";

}

}


function render(){

let html="";

players.forEach((p,i)=>{

html+=`

<div class="player ${p.dead ? "dead" : ""}">

${p.dead ? '<div class="tombstone">🪦</div>' : ""}

<h2>${p.name}</h2>

<div class="lives">
❤️ ${p.lives}
</div>

<button class="lifeBtn"
onclick="changeLife(${i},1)">
+
</button>

<button class="lifeBtn"
onclick="changeLife(${i},-1)">
−
</button>

</div>

`;

});

document.getElementById("players").innerHTML=
html;

}


setInterval(()=>{

seconds++;

let mins=
Math.floor(seconds/60);

let secs=
seconds%60;

document.getElementById("timer").innerHTML=

String(mins).padStart(2,"0")

+":"

+String(secs).padStart(2,"0");

},1000);

</script>

</body>
</html>
