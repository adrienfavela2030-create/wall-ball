<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wall Ball Elite</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
min-height:100vh;
color:white;
overflow-x:hidden;
transition:.4s;
}

body.original{
background:
radial-gradient(circle at top,#5aa043,#204d1a);
}

body.pro{
background:
radial-gradient(circle at top,#4a0000,#000);
}

.container{
padding:25px;
text-align:center;
}

.title{
font-size:58px;
font-weight:900;
letter-spacing:4px;
margin-top:15px;
text-shadow:0 0 20px rgba(255,255,255,.3);
animation:float 3s infinite;
}

@keyframes float{
50%{transform:translateY(-5px);}
}

.subtitle{
opacity:.8;
margin-bottom:30px;
}

.glass{

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:30px;

padding:25px;

max-width:700px;

margin:auto;

box-shadow:0 20px 40px rgba(0,0,0,.4);

}

input{

display:block;

margin:15px auto;

width:100%;

max-width:450px;

padding:18px;

font-size:20px;

border:none;

outline:none;

border-radius:18px;

}

.bigBtn{

padding:18px 35px;

font-size:22px;

font-weight:900;

border:none;

border-radius:20px;

cursor:pointer;

margin:10px;

transition:.2s;

}

.bigBtn:hover{
transform:scale(1.08);
}

.original .bigBtn{
background:#8a4dff;
color:white;
box-shadow:0 0 25px #8a4dff;
}

.pro .bigBtn{
background:#b30000;
color:white;
box-shadow:0 0 25px red;
}

.modeRow{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

margin:25px 0;

}

.modeCard{

width:220px;

padding:25px;

border-radius:25px;

cursor:pointer;

font-size:22px;

font-weight:bold;

transition:.25s;

background:rgba(255,255,255,.08);

}

.modeCard:hover{
transform:scale(1.05);
}

.playerCounter{

font-size:20px;

margin:10px;

opacity:.85;

}

#game{
display:none;
}

#timer{

font-size:48px;

font-weight:bold;

margin:20px;

}

.players{

display:flex;

flex-wrap:wrap;

justify-content:center;

gap:25px;

margin-top:20px;

}

.player{

width:320px;

padding:25px;

border-radius:30px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(16px);

box-shadow:0 20px 40px rgba(0,0,0,.4);

position:relative;

overflow:hidden;

transition:.25s;

}

.playerName{
font-size:32px;
font-weight:900;
}

.lives{

font-size:65px;

margin:20px;

font-weight:bold;

}

.lifeRow button{

width:120px;

height:70px;

font-size:35px;

margin:8px;

border:none;

border-radius:20px;

cursor:pointer;

font-weight:bold;

}

.dead{
opacity:.3;
}

.tombstone{

position:absolute;

left:50%;

transform:translateX(-50%);

font-size:120px;

animation:slam .7s forwards;

}

@keyframes slam{

0%{
top:-400px;
}

85%{
top:-10px;
}

100%{
top:0;
}

}

#winner{

font-size:65px;

font-weight:900;

color:gold;

margin:35px;

animation:pulse 1s infinite;

}

@keyframes pulse{
50%{transform:scale(1.06);}
}

.shake{
animation:shake .35s;
}

@keyframes shake{

0%{transform:translateX(-10px);}
25%{transform:translateX(10px);}
50%{transform:translateX(-10px);}
75%{transform:translateX(10px);}
100%{transform:translateX(0);}
}

</style>
</head>

<body class="original">

<div id="setup" class="container">

<h1 class="title">WALL BALL</h1>

<p class="subtitle">
ELITE SCOREBOARD
</p>

<div class="glass">

<div id="nameInputs">

<input placeholder="Player 1">
<input placeholder="Player 2">

</div>

<p class="playerCounter" id="counter">
2 / 4 Players
</p>

<button class="bigBtn"
onclick="addInput()">
+ ADD PLAYER
</button>


<div class="modeRow">

<div class="modeCard"
onclick="setMode('original')">

🟣 ORIGINAL

</div>

<div class="modeCard"
onclick="setMode('pro')">

🩸 PROFESSIONAL

</div>

</div>


<button class="bigBtn"
onclick="startGame()">

START MATCH

</button>

</div>

</div>



<div id="game" class="container">

<h1 class="title">
WALL BALL
</h1>

<div id="timer">
00:00
</div>

<div id="players"
class="players"></div>

<div id="winner"></div>

</div>


<audio id="deathSound">
<source src="https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3">
</audio>


<script>

let players=[];

let seconds=0;

function setMode(mode){

document.body.className=mode;

}


function addInput(){

let container=
document.getElementById("nameInputs");

if(container.children.length>=4)return;

let input=
document.createElement("input");

input.placeholder=
"Player "+(container.children.length+1);

container.appendChild(input);

document.getElementById("counter")
.innerHTML=
container.children.length+" / 4 Players";

}


function startGame(){

players=[];

document
.querySelectorAll("#nameInputs input")
.forEach(i=>{

if(i.value.trim()){

players.push({

name:i.value.trim(),

lives:5,

dead:false

});

}

});

if(players.length<2){

alert("Need 2 players");

return;

}

document.getElementById("setup")
.style.display="none";

document.getElementById("game")
.style.display="block";

render();

}


function changeLife(i,val){

let p=players[i];

if(p.dead)return;

p.lives+=val;

document.body.classList.add("shake");

setTimeout(()=>{

document.body.classList.remove("shake");

},350);


if(p.lives<=0){

p.lives=0;

p.dead=true;

document.getElementById(
"deathSound").play();

}

render();

checkWinner();

}


function checkWinner(){

let alive=
players.filter(x=>!x.dead);

if(alive.length===1){

document.getElementById(
"winner").innerHTML=

"🏆 "+alive[0].name+
" WINS";

}

}


function render(){

let html="";

players.forEach((p,i)=>{

html+=`

<div class="player ${p.dead?"dead":""}">

${p.dead?
'<div class="tombstone">🪦</div>'
:""}

<div class="playerName">

${p.name}

</div>

<div class="lives">

❤️ ${p.lives}

</div>

<div class="lifeRow">

<button
onclick="changeLife(${i},1)">
+
</button>

<button
onclick="changeLife(${i},-1)">
−
</button>

</div>

</div>

`;

});

document.getElementById(
"players").innerHTML=html;

}


setInterval(()=>{

seconds++;

let m=
Math.floor(seconds/60);

let s=
seconds%60;

document.getElementById(
"timer").innerHTML=

String(m).padStart(2,"0")
+":"
+String(s).padStart(2,"0");

},1000);

</script>

</body>
</html>
